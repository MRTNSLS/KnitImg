name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v2.1.3

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Build across all 3 operating systems
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    # We must make the bash script executable on Linux/Mac
    - name: Make build script executable (Ubuntu/macOS)
      if: runner.os != 'Windows'
      run: chmod +x build.sh

    - name: Build with PyInstaller (Ubuntu/macOS)
      if: runner.os != 'Windows'
      run: ./build.sh
      
    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: build.bat
      
    - name: Archive application (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        cd dist
        tar -czvf KnitImg-linux.tar.gz KnitImg/
        
    - name: Archive application (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist
        tar -czvf KnitImg-macos.tar.gz KnitImg/
        
    - name: Archive application (Windows)
      if: runner.os == 'Windows'
      run: |
        cd dist
        Compress-Archive -Path KnitImg -DestinationPath KnitImg-windows.zip
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/KnitImg-linux.tar.gz
          dist/KnitImg-macos.tar.gz
          dist/KnitImg-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

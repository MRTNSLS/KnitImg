name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v2.1.3

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x64

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Make build script executable (Ubuntu/macOS)
      if: runner.os != 'Windows'
      run: chmod +x build.sh

    - name: Build with PyInstaller (Ubuntu/macOS)
      if: runner.os != 'Windows'
      run: ./build.sh
      
    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: .\build.bat
      
    - name: Archive application (Linux)
      if: matrix.platform == 'linux'
      run: |
        cd dist
        tar -czvf KnitImg-linux-${{ matrix.arch }}.tar.gz KnitImg/
        echo "RELEASE_FILE=dist/KnitImg-linux-${{ matrix.arch }}.tar.gz" >> $GITHUB_ENV
        
        
    - name: Archive application (Windows)
      if: matrix.platform == 'windows'
      run: |
        cd dist
        Compress-Archive -Path KnitImg -DestinationPath KnitImg-windows-${{ matrix.arch }}.zip
        echo "RELEASE_FILE=dist/KnitImg-windows-${{ matrix.arch }}.zip" >> $env:GITHUB_ENV
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.RELEASE_FILE }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
